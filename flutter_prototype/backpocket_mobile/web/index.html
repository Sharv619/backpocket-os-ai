<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BackPocket OS — AI-powered business automation for tradies and construction.">
  <meta name="theme-color" content="#0a0e27">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BackPocket OS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <title>BackPocket OS — Pip</title>

  <style>
    :root {
      --cream: #FAF7F2;
      --terracotta: #C87941;
      --brown: #1A1613;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0e27; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--cream);
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #2d1b4e 100%);
      z-index: 9999;
      transition: opacity 0.6s ease-out;
    }
    #splash::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }
    #splash .mark {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--cream) 0%, var(--terracotta) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 1;
    }
    #splash .sub {
      font-size: 13px;
      color: rgba(250, 247, 242, 0.55);
      letter-spacing: 0.4px;
      z-index: 1;
    }
    #splash .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--terracotta);
      animation: pulse 1.4s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    #splash.fade { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="mark">BackPocket OS</div>
    <div class="sub">Loading Pip…</div>
    <div class="dot"></div>
  </div>

  <script>
    // Fade splash once Flutter has painted its first frame
    window.addEventListener('flutter-first-frame', function () {
      const s = document.getElementById('splash');
      if (s) {
        s.classList.add('fade');
        setTimeout(function () { s.remove(); }, 700);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
