version: "3.8"

# BackPocket OS — full stack
# Usage:
#   docker-compose up -d            # start everything
#   docker-compose logs -f api      # watch backend logs
#   docker-compose restart api      # hot-restart after code change

services:

  # ── Python FastAPI backend + static Flutter serving ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    network_mode: host
    environment:
      - POSTGRES_DB_URL=postgresql+psycopg2://backpocket_user:backpocket_password@localhost:5433/backpocket_db
      - OLLAMA_HOST=http://localhost:11434
    volumes:
      - ./backpocket.db:/app/backpocket.db
      - ./uploads:/app/uploads
      - ./documents:/app/documents
      - ./token.json:/app/token.json
      - ./token_ywa.json:/app/token_ywa.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Vector DB (pgvector) ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: backpocket_user
      POSTGRES_PASSWORD: backpocket_password
      POSTGRES_DB: backpocket_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backpocket_user -d backpocket_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backpocket

  # ── Paperless-ngx document management ────────────────────────────────────
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - paperless_redis:/data
    networks:
      - backpocket

  paperless_db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    volumes:
      - paperless_pg:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    networks:
      - backpocket

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless_db
      - broker
    ports:
      - "8010:8000"
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - ./paperless_export:/usr/src/paperless/export
      - ./paperless_consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: paperless_db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-backpocket-paperless-secret-change-in-prod}
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_OCR_MODE: skip_noarchive
      PAPERLESS_DATE_ORDER: DMY
      PAPERLESS_TIME_ZONE: Australia/Sydney
      PAPERLESS_ALLOWED_HOSTS: "*"
      PAPERLESS_CORS_ALLOWED_HOSTS: "http://localhost,http://localhost:80,http://localhost:8000"
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-backpocket123}
      PAPERLESS_ADMIN_MAIL: ${PAPERLESS_ADMIN_MAIL:-admin@backpocket.local}
    networks:
      - backpocket

networks:
  backpocket:
    driver: bridge

volumes:
  pg_data:
  paperless_redis:
  paperless_pg:
  paperless_data:
  paperless_media:

