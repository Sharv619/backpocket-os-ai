name: Deploy to Oracle ARM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest -q --tb=short

  build-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        run: |
          cd flutter_prototype/backpocket_mobile
          flutter pub get
          flutter build web --release --base-href /app/

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: flutter_prototype/backpocket_mobile/build/web
          retention-days: 1

  deploy:
    needs: [test, build-flutter]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: flutter-web-dist

      - name: Copy Flutter assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USERNAME }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "flutter-web-dist/*"
          target: "/opt/backpocket/static_flutter"
          strip_components: 1

      - name: Pull & restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USERNAME }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/backpocket
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart backpocket
            sleep 3
            sudo systemctl is-active backpocket
            echo "Deployed $(git rev-parse --short HEAD) at $(date -u)"
