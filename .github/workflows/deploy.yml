name: Deploy to Oracle ARM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10" # Align with Oracle ARM setup
  OLLAMA_BASE_URL: "http://10.0.0.10:11434"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio uvicorn httpx # Added uvicorn and httpx for consistency with Oracle setup

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy . --ignore-missing-imports || true

      - name: Test
        run: pytest -v --tb=short || true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0" # Pin to version used in requirements

      - name: Flutter Pub Get
        run: |
          cd flutter_prototype/backpocket_mobile
          flutter pub get

      - name: Flutter Build Web
        run: |
          cd flutter_prototype/backpocket_mobile
          flutter build web --release --base-href /static/

      - name: Archive Flutter Web Build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutter_prototype/backpocket_mobile/build/web
          retention-days: 7

      - name: Upload Python and MCP Code
        uses: actions/upload-artifact@v4
        with:
          name: backend-code
          path: |
            main.py
            services/
            mcp_servers/
            requirements.txt
            # Add other necessary backend files/directories
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Flutter Web Build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: /tmp/flutter-web-build

      - name: Download Backend Code
        uses: actions/download-artifact@v4
        with:
          name: backend-code
          path: /tmp/backend-code

      - name: Deploy to Oracle ARM VM via SSH
        uses: appleboy/ssh-action@v0.1.10 # Using v0.1.10 as specified previously
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USERNAME }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            APP_DIR="/var/www/backpocket-mvp" # Ensure this matches APP_DIR in oracle_arm_setup.sh
            
            # Create application directory if it doesn't exist
            mkdir -p $APP_DIR

            # Sync backend code
            rsync -avz --delete /tmp/backend-code/ $APP_DIR/

            # Sync Flutter web build
            mkdir -p $APP_DIR/static/
            rsync -avz --delete /tmp/flutter-web-build/ $APP_DIR/static/

            # Recreate/update Python virtual environment if necessary
            cd $APP_DIR
            python3 -m venv venv || true # Use || true to avoid failing if venv exists
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            # Add any other core dependencies if not in requirements.txt (e.g., uvicorn, httpx)
            pip install uvicorn httpx cryptography

            # Restart the FastAPI service
            sudo systemctl restart backpocket-api

            echo "Deployment complete."

        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}