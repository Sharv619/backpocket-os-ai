<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BackPocket — Sign In</title>
<style>
  :root {
    --bg: #0b0d11; --panel: #181b22; --line: #2a2f3a;
    --ink: #e8ecf1; --mute: #8a93a6; --accent: #5cc8ff; --ok: #6ee7a8; --warn: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    color: var(--ink);
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
  .logo span { color: var(--accent); }
  .sub { color: var(--mute); font-size: 13px; margin-bottom: 32px; }

  .tabs { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .tab { flex: 1; text-align: center; padding: 8px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--mute); background: transparent; border: none; transition: all .15s; }
  .tab.active { background: var(--accent); color: #0b0d11; }

  label { display: block; font-size: 12px; color: var(--mute); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
  input {
    width: 100%; padding: 10px 14px; background: #0f1115; border: 1px solid var(--line);
    border-radius: 8px; color: var(--ink); font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .field { margin-bottom: 18px; }

  button[type=submit] {
    width: 100%; padding: 12px; background: var(--accent); color: #0b0d11;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 4px; transition: opacity .15s;
  }
  button[type=submit]:hover { opacity: 0.88; }
  button[type=submit]:disabled { opacity: 0.4; cursor: not-allowed; }

  .msg { font-size: 12px; margin-top: 14px; min-height: 18px; text-align: center; }
  .msg.error { color: var(--warn); }
  .msg.ok    { color: var(--ok); }

  .hint {
    margin-top: 20px; padding: 12px 14px; background: #0f1115;
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 11px; color: var(--mute); line-height: 1.7;
  }
  .hint code { color: var(--accent); font-family: monospace; }

  #section-jwt { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Back<span>Pocket</span></div>
  <div class="sub">Sign in to your workspace</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('key')" id="tab-key">Access Key</button>
    <button class="tab" onclick="showTab('jwt')" id="tab-jwt">Account Login</button>
  </div>

  <!-- Phase A: API Key -->
  <form id="section-key" onsubmit="submitKey(event)">
    <div class="field">
      <label for="api-key">Access Key</label>
      <input type="password" id="api-key" placeholder="Paste your BP_API_KEY here" autocomplete="current-password" />
    </div>
    <button type="submit" id="btn-key">Sign In</button>
    <div class="msg" id="msg-key"></div>
    <div class="hint">
      Your key is in <code>.env</code> → <code>BP_API_KEY</code>.<br>
      It stays in your browser — never sent to anyone else.
    </div>
  </form>

  <!-- Phase B: Supabase JWT -->
  <form id="section-jwt" onsubmit="submitJWT(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button type="submit" id="btn-jwt">Sign In</button>
    <div class="msg" id="msg-jwt"></div>
  </form>
</div>

<script>
const STORAGE_KEY = 'bp_api_key';
const TOKEN_KEY   = 'bp_token';

function nextUrl() {
  const p = new URLSearchParams(window.location.search).get('next');
  return p && p.startsWith('/') ? p : '/admin/kanban';
}

function showTab(tab) {
  document.getElementById('section-key').style.display = tab === 'key' ? 'block' : 'none';
  document.getElementById('section-jwt').style.display = tab === 'jwt' ? 'block' : 'none';
  document.getElementById('tab-key').classList.toggle('active', tab === 'key');
  document.getElementById('tab-jwt').classList.toggle('active', tab === 'jwt');
}

async function submitKey(e) {
  e.preventDefault();
  const key = document.getElementById('api-key').value.trim();
  const msg = document.getElementById('msg-key');
  const btn = document.getElementById('btn-key');
  if (!key) { msg.textContent = 'Please enter your access key.'; msg.className = 'msg error'; return; }

  btn.disabled = true;
  msg.textContent = 'Checking…';
  msg.className = 'msg';

  try {
    const r = await fetch('/api/health?api_key=' + encodeURIComponent(key));
    if (r.ok) {
      localStorage.setItem(STORAGE_KEY, key);
      msg.textContent = 'Looks good — redirecting…';
      msg.className = 'msg ok';
      setTimeout(() => { window.location.href = nextUrl(); }, 400);
    } else {
      msg.textContent = 'Wrong key. Check BP_API_KEY in your .env.';
      msg.className = 'msg error';
      btn.disabled = false;
    }
  } catch (err) {
    msg.textContent = 'Could not reach the server. Is it running?';
    msg.className = 'msg error';
    btn.disabled = false;
  }
}

async function submitJWT(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg      = document.getElementById('msg-jwt');
  const btn      = document.getElementById('btn-jwt');

  btn.disabled = true;
  msg.textContent = 'Signing in…';
  msg.className = 'msg';

  try {
    const r = await fetch('/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    if (r.ok && data.access_token) {
      localStorage.setItem(TOKEN_KEY, data.access_token);
      msg.textContent = 'Signed in — redirecting…';
      msg.className = 'msg ok';
      setTimeout(() => { window.location.href = nextUrl(); }, 400);
    } else {
      msg.textContent = data.detail || 'Invalid email or password.';
      msg.className = 'msg error';
      btn.disabled = false;
    }
  } catch (err) {
    msg.textContent = 'Server error. Try again.';
    msg.className = 'msg error';
    btn.disabled = false;
  }
}

// If already signed in, skip login
if (localStorage.getItem(STORAGE_KEY) || localStorage.getItem(TOKEN_KEY)) {
  window.location.href = nextUrl();
}
</script>
</body>
</html>
